apiVersion: apps/v1
kind: Deployment
metadata:
  name: grocery-delivery-app
  labels:
    app: grocery-delivery-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grocery-delivery-app
  template:
    metadata:
      labels:
        app: grocery-delivery-app
    spec:
      containers:
      - name: grocery-delivery-app
        image: grocery-delivery-system:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: grocery-delivery-service
  labels:
    app: grocery-delivery-app
spec:
  type: LoadBalancer 
  selector:
    app: grocery-delivery-app
  ports:
    - protocol: TCP
      port: 8080      
      targetPort: 8080
